name: Version Sync

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'docker/Dockerfile'
  pull_request:
    paths:
      - 'package.json'
      - 'docker/Dockerfile'

permissions: {}

jobs:
  check:
    name: Version Sync Check
    permissions:
      contents: read # required for checkout
    uses: open-crypto-broker/.github/.github/workflows/version-sync-check.yaml@main # nolint # zizmor: ignore[unpinned-uses]
    with:
      language: js
