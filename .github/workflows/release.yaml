name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

################################################
# Metadata
################################################
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit: ${{ steps.meta.outputs.commit }}
      is_rc: ${{ steps.meta.outputs.is_rc }}
      image_name: ${{ steps.meta.outputs.image_name }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      component_repo: ${{ steps.meta.outputs.component_repo }}
      sbom_file: ${{ steps.meta.outputs.sbom_file }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: meta
        run: |
          TAG="${{ github.ref_name }}"
          COMMIT=$(git rev-parse HEAD)

          if [[ "$TAG" == *"-rc"* ]]; then
            IS_RC=true
            IMAGE_REPO="ghcr.io/open-crypto-broker/test_app_js-rc"
            COMPONENT_REPO="ghcr.io/open-crypto-broker/ocm-components-rc"
          else
            IS_RC=false
            IMAGE_REPO="ghcr.io/open-crypto-broker/test_app_js"
            COMPONENT_REPO="ghcr.io/open-crypto-broker/ocm-components"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "is_rc=$IS_RC" >> $GITHUB_OUTPUT
          echo "image_repo=$IMAGE_REPO" >> $GITHUB_OUTPUT
          IMAGE_NAME=$(basename "$IMAGE_REPO")
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "component_repo=$COMPONENT_REPO" >> $GITHUB_OUTPUT
          echo "sbom_file=${IMAGE_NAME}-${TAG}-sbom.spdx.json" >> $GITHUB_OUTPUT

      - name: Print release summary
        run: |
          echo "Release tag: ${{ steps.meta.outputs.tag }}"
          echo "RC mode: ${{ steps.meta.outputs.is_rc }}"
          echo "Image name: ${{ steps.meta.outputs.image_name }}"
          echo "Docker repo: ${{ steps.meta.outputs.image_repo }}"
          echo "OCM repo: ${{ steps.meta.outputs.component_repo }}"
          echo "SBOM file: ${{ steps.meta.outputs.sbom_file }}"

################################################
# Build binaries (reusable workflow)
################################################
  build-binaries:
    needs: metadata

    uses: open-crypto-broker/.github/.github/workflows/build-release.yaml@main
    with:
      is_rc: ${{ needs.metadata.outputs.is_rc }}
      language: js
      build-name: ${{ needs.metadata.outputs.image_name }}
      tag: ${{ needs.metadata.outputs.tag }}

################################################
# Build Docker image (reusable workflow)
################################################
  docker:
    needs: metadata
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/open-crypto-broker
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image and push
        id: build
        uses: open-crypto-broker/.github/actions/publish-ghcr@main
        with:
          is_rc: ${{ needs.metadata.outputs.is_rc }}
          registry: ghcr.io/open-crypto-broker
          image_name: ${{ needs.metadata.outputs.image_name }}
          image_tag: ${{ needs.metadata.outputs.tag }}
          image_sha: ${{ needs.metadata.outputs.commit }}

      - name: Print digest
        run: echo "Digest=${{ steps.build.outputs.digest }}"

################################################
# SBOM + Security Scan
################################################
  security:
    needs:
      - metadata
      - docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build image reference
        id: image
        run: |
          echo "ref=${{ needs.metadata.outputs.image_repo }}@${{ needs.docker.outputs.digest }}"  >> $GITHUB_OUTPUT

      - name: Debug image
        run: |
          echo "Image ref: ${{ steps.image.outputs.ref }}"
          docker pull ${{ steps.image.outputs.ref }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.ref }}
          format: spdx-json
          output-file: ${{ needs.metadata.outputs.sbom_file }}

      - name: Scan image
        uses: anchore/scan-action@v7
        with:
          image: ${{ steps.image.outputs.ref }}
          fail-build: true
          severity-cutoff: high

      - name: Upload SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        if: needs.metadata.outputs.is_rc != 'true'
        with:
          files: ${{ needs.metadata.outputs.sbom_file }}

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
          | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Attach SBOM to image (OCI referrer)
        run: |
          oras attach "${{ steps.image.outputs.ref }}" "${{ needs.metadata.outputs.sbom_file }}" \
            --artifact-type application/spdx+json
