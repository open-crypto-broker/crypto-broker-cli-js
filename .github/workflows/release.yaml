name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  ################################################
  # GitHub release with changelog details
  ################################################
  github-release:
    name: Create GitHub Release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --verify-tag -F release-notes.md

  ################################################
  # Metadata (reusable workflow)
  ################################################
  metadata:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit: ${{ steps.meta.outputs.commit }}
      is_rc: ${{ steps.meta.outputs.is_rc }}
      image_name: ${{ steps.meta.outputs.image_name }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      component_repo: ${{ steps.meta.outputs.component_repo }}
      sbom_file: ${{ steps.meta.outputs.sbom_file }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: meta
        uses: open-crypto-broker/.github/actions/release-metadata@main # nolint # zizmor: ignore[unpinned-uses]
        with:
          image-base-name: test_app_js

  ################################################
  # Build binaries (reusable workflow)
  ################################################
  build-binaries:
    needs: metadata
    permissions:
      contents: write
      packages: write

    uses: open-crypto-broker/.github/.github/workflows/build-release.yaml@main # nolint # zizmor: ignore[unpinned-uses]
    with:
      is_rc: ${{ needs.metadata.outputs.is_rc }}
      language: js
      build-name: ${{ needs.metadata.outputs.image_name }}
      tag: ${{ needs.metadata.outputs.tag }}

  ################################################
  # Build Docker + Security scan (reusable workflow)
  ################################################
  build-docker:
    needs: metadata
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    uses: open-crypto-broker/.github/.github/workflows/release-docker-security.yaml@main # nolint # zizmor: ignore[unpinned-uses]
    with:
      tag: ${{ needs.metadata.outputs.tag }}
      commit: ${{ needs.metadata.outputs.commit }}
      is_rc: ${{ needs.metadata.outputs.is_rc }}
      image_name: ${{ needs.metadata.outputs.image_name }}
      image_repo: ${{ needs.metadata.outputs.image_repo }}
      sbom_file: ${{ needs.metadata.outputs.sbom_file }}
